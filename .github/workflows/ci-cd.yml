name: CI/CD — Test · Deploy · Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test:
    name: Compile & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: ./project1-erc20-staking
        run: npm install

      - name: Compile contracts
        working-directory: ./project1-erc20-staking
        run: npx hardhat compile

      - name: Run tests
        working-directory: ./project1-erc20-staking
        run: npx hardhat test

  deploy-contracts:
    name: Deploy to Sepolia
    runs-on: ubuntu-latest
    needs: test
    if: false
    outputs:
      token_address: ${{ steps.deploy.outputs.token_address }}
      staking_address: ${{ steps.deploy.outputs.staking_address }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: ./project1-erc20-staking
        run: npm install

      - name: Deploy contracts
        id: deploy
        working-directory: ./project1-erc20-staking
        run: |
          OUTPUT=$(npx hardhat run scripts/deploy.js --network sepolia 2>&1)
          echo "$OUTPUT"
          TOKEN=$(echo "$OUTPUT" | grep "UDAYToken deployed to:" | awk '{print $NF}')
          STAKING=$(echo "$OUTPUT" | grep "StakingRewards deployed to:" | awk '{print $NF}')
          echo "token_address=$TOKEN" >> $GITHUB_OUTPUT
          echo "staking_address=$STAKING" >> $GITHUB_OUTPUT
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-contracts
    if: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Install frontend dependencies
        working-directory: ./project1-erc20-staking/frontend
        run: npm install

      - name: Deploy to Vercel
        working-directory: ./project1-erc20-staking/frontend
        run: vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
